services:
  postgres:
    image: postgres:16-alpine
    container_name: acquire-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: acquire
      POSTGRES_USER: acquire
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acquire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  backend:
    image: acquire-backend:latest
    container_name: acquire-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://acquire:${POSTGRES_PASSWORD}@postgres:5432/acquire
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    container_name: acquire-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dist:/srv/hotelgame:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend]

networks:
  internal:

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
