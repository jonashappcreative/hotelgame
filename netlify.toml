# Netlify Build Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command to run
  command = "npm run build"

  # Directory that contains the deploy-ready HTML files and assets
  publish = "dist"

  # Directory with the serverless functions (game-action + auth endpoints)
  functions = "netlify/functions"

[build.environment]
  # Node version for builds and functions runtime
  NODE_VERSION = "20"

  # These are public, non-secret URLs (the realtime relay endpoint). They must
  # appear in the client bundle (VITE_WS_URL) and the CSP connect-src directive
  # (see the Content-Security-Policy header below), so exclude them from
  # Netlify's secrets scanner to avoid false positives that fail the build.
  SECRETS_SCAN_OMIT_KEYS = "VITE_WS_URL,WS_SERVER_URL"

# Clean /api/* paths map to the serverless functions.
# Must come BEFORE the SPA catch-all so it is matched first.
[[redirects]]
  from = "/api/auth/anonymous"
  to = "/.netlify/functions/auth-anonymous"
  status = 200
[[redirects]]
  from = "/api/auth/signup"
  to = "/.netlify/functions/auth-signup"
  status = 200
[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200
[[redirects]]
  from = "/api/game-action"
  to = "/.netlify/functions/game-action"
  status = 200
[[redirects]]
  from = "/api/rooms"
  to = "/.netlify/functions/rooms"
  status = 200
[[redirects]]
  from = "/api/account"
  to = "/.netlify/functions/account"
  status = 200

# Redirect rules for Single Page Application (SPA)
# This ensures all routes are handled by React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://server.jonashapp.com wss://server.jonashapp.com; img-src 'self' data: https://lovable.dev; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # Cache static assets for 1 year
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache the main HTML file
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Development context (for branch deploys)
[context.deploy-preview]
  command = "npm run build"

# Branch deploys
[context.branch-deploy]
  command = "npm run build"

# Production context
[context.production]
  command = "npm run build"
  publish = "dist"
